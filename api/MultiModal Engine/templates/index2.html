<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoSpec Search</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0E1116;
    --panel: #161B22;
    --panel-border: #262D38;
    --text-primary: #E6E9EF;
    --text-secondary: #8B92A1;
    --amber: #F2A93B;
    --amber-dim: #6B5526;
    --blue: #4FA8E8;
    --green: #3DD68C;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 32px 20px;
  }

  .wrap { max-width: 880px; margin: 0 auto; }

  /* ── Header ───────────────────────────── */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--panel-border);
    padding-bottom: 16px;
    margin-bottom: 28px;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand-mark {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--amber);
    border: 1px solid var(--amber-dim);
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.08em;
  }
  .brand-name { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }
  .brand-tag { font-family: var(--mono); font-size: 11px; color: var(--text-secondary); }

  /* ── Model filter ─────────────────────── */
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-pill {
    font-family: var(--mono);
    font-size: 11.5px;
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid var(--panel-border);
    background: var(--panel);
    color: var(--text-secondary);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .filter-pill:hover { border-color: var(--blue); color: var(--text-primary); }
  .filter-pill.active { border-color: var(--amber); color: var(--amber); background: #1C1610; }

  /* ── Search bar ───────────────────────── */
  .search-row { display: flex; gap: 8px; margin-bottom: 28px; }
  .search-row input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 5px;
    padding: 13px 14px;
    color: var(--text-primary);
    font-family: var(--sans);
    font-size: 14.5px;
    outline: none;
  }
  .search-row input:focus { border-color: var(--blue); }
  .search-row input::placeholder { color: var(--text-secondary); }
  .search-row button {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    background: var(--amber);
    color: #1C1610;
    border: none;
    border-radius: 5px;
    padding: 0 22px;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: filter 0.15s;
  }
  .search-row button:hover { filter: brightness(1.08); }
  .search-row button:disabled { background: var(--panel-border); color: var(--text-secondary); cursor: not-allowed; }

  /* ── Status line ──────────────────────── */
  .status-line {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--text-secondary);
    margin-bottom: 20px;
    min-height: 16px;
    letter-spacing: 0.02em;
  }
  .status-line.error { color: #E8604F; }
  .blink { animation: blink 1.1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0.2; } }

  /* ── Answer panel ─────────────────────── */
  .answer-panel {
    background: var(--panel);
    border: 1px solid var(--green);
    border-radius: 6px;
    padding: 18px 20px;
    margin-bottom: 24px;
    display: none;
  }
  .answer-label {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--green);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .answer-label::before { content: "●"; font-size: 8px; }
  .answer-text { font-size: 14.5px; line-height: 1.65; color: var(--text-primary); white-space: pre-wrap; }

  /* ── Results ──────────────────────────── */
  .results-label {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text-secondary);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  .result-card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 16px 18px;
    margin-bottom: 10px;
  }
  .result-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .source-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--blue);
    background: #102230;
    border: 1px solid #1F4A63;
    padding: 3px 8px;
    border-radius: 3px;
  }
  .page-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-secondary);
  }
  .result-text { font-size: 13.5px; line-height: 1.6; color: var(--text-primary); margin-bottom: 12px; }

  .signal-row { display: flex; align-items: center; gap: 10px; }
  .signal-label { font-family: var(--mono); font-size: 10px; color: var(--text-secondary); letter-spacing: 0.05em; }
  .signal-bars { display: flex; gap: 2px; align-items: flex-end; height: 12px; }
  .signal-bar { width: 4px; background: var(--panel-border); border-radius: 1px; }
  .signal-bar.lit { background: var(--amber); }
  .signal-score { font-family: var(--mono); font-size: 11px; color: var(--amber); margin-left: 2px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
    font-family: var(--mono);
    font-size: 12.5px;
    letter-spacing: 0.02em;
  }

  @media (max-width: 600px) {
    .header { flex-direction: column; align-items: flex-start; gap: 4px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="header">
    <div class="brand">
      <span class="brand-mark">AS</span>
      <span class="brand-name">AutoSpec Search</span>
    </div>
    <span class="brand-tag">manufacturing doc retrieval // v0.1</span>
  </div>

  <div class="filters" id="filters">
    <span class="filter-pill active" data-model="all">ALL MODELS</span>
    <span class="filter-pill" data-model="audi">AUDI</span>
    <span class="filter-pill" data-model="bmw">BMW</span>
    <span class="filter-pill" data-model="vdl">VDL</span>
  </div>

  <div class="search-row">
    <input type="text" id="queryInput" placeholder="e.g. torque spec front wheel hub bolt" />
    <button id="searchBtn">SEARCH</button>
  </div>

  <div class="status-line" id="statusLine"></div>

  <div class="answer-panel" id="answerPanel">
    <div class="answer-label">AI ANSWER</div>
    <div class="answer-text" id="answerText"></div>
  </div>

  <div id="resultsContainer"></div>

</div>

<script>
const API_URL = "/search";

const queryInput = document.getElementById("queryInput");
const searchBtn = document.getElementById("searchBtn");
const statusLine = document.getElementById("statusLine");
const answerPanel = document.getElementById("answerPanel");
const answerText = document.getElementById("answerText");
const resultsContainer = document.getElementById("resultsContainer");
const filters = document.getElementById("filters");

let activeModel = "all";

filters.addEventListener("click", (e) => {
  const pill = e.target.closest(".filter-pill");
  if (!pill) return;
  document.querySelectorAll(".filter-pill").forEach(p => p.classList.remove("active"));
  pill.classList.add("active");
  activeModel = pill.dataset.model;
});

function signalBars(score) {
  // score expected 0..1 (cosine similarity-ish); render as 5-bar meter
  const litCount = Math.max(1, Math.round(score * 5));
  let html = '<div class="signal-bars">';
  for (let i = 0; i < 5; i++) {
    const height = 4 + i * 2;
    const lit = i < litCount ? "lit" : "";
    html += `<div class="signal-bar ${lit}" style="height:${height}px"></div>`;
  }
  html += '</div>';
  return html;
}

function renderResults(sources) {
  if (!sources || sources.length === 0) {
    resultsContainer.innerHTML = `<div class="empty-state">NO MATCHING PASSAGES FOUND</div>`;
    return;
  }

  resultsContainer.innerHTML =
    `<div class="results-label">MATCHED PASSAGES — ${sources.length} RESULT${sources.length > 1 ? "S" : ""}</div>` +
    sources.map(s => {
      const filename = s.source.split(/[\\/]/).pop();
      const pageLabel = (s.page !== null && s.page !== undefined) ? `page ${s.page}` : "page —";
      return `
        <div class="result-card">
          <div class="result-meta">
            <span class="source-tag">${filename}</span>
            <span class="page-tag">${pageLabel}</span>
          </div>
          <div class="result-text">${s.text}</div>
          <div class="signal-row">
            <span class="signal-label">RELEVANCE</span>
            ${signalBars(s.score)}
            <span class="signal-score">${s.score.toFixed(3)}</span>
          </div>
        </div>
      `;
    }).join("");
}

async function runSearch() {
  const query = queryInput.value.trim();
  if (!query) return;

  searchBtn.disabled = true;
  answerPanel.style.display = "none";
  resultsContainer.innerHTML = "";
  statusLine.classList.remove("error");
  statusLine.innerHTML = `<span class="blink">▍</span> querying vector store...`;

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, top_k: 4 })
    });

    if (!res.ok) throw new Error(`Server returned ${res.status}`);

    const data = await res.json();

    statusLine.textContent = `done · ${data.sources.length} passages retrieved`;
    answerText.textContent = data.answer;
    answerPanel.style.display = "block";
    renderResults(data.sources);

  } catch (err) {
    statusLine.classList.add("error");
    statusLine.textContent = `ERROR: ${err.message} — is the API running on localhost:8000?`;
    resultsContainer.innerHTML = "";
  } finally {
    searchBtn.disabled = false;
  }
}

searchBtn.addEventListener("click", runSearch);
queryInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") runSearch();
});
</script>

</body>
</html>
