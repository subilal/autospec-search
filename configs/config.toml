[paths]
spec_docs_folder = "docs"
vector_store_path = "models/qdrant_audi_vector_store2"
multi_vector_store_path = "models/multimodal_engine/qdrant_audi_multi_vector_store2"

[collections]
text_collection = "audi_spec_docs2"
multi_text_collection = "audi_multi_spec_docs2"
multi_image_collection = "audi_multi_spec_docs2_images"

[chunking]
chunk_size = 500
chunk_overlap = 100

[embeddings]
text_model = "all-MiniLM-L6-v2"
clip_model = "clip-ViT-B-32"

caption_model = "Salesforce/blip-image-captioning-base"

[image_extraction]
min_width = 50
min_height = 50

caption_max_new_tokens = 40

[llm]
ollama_url = "http://localhost:11434/api/generate"
ollama_model = "llama3.1"
request_timeout_seconds = 300

[search]
default_top_k = 4

[conversation]
max_turns_kept = 5