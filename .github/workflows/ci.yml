name: CI — Lint & Test

on:
 workflow_dispatch:

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff (check only, no fix)
        run: ruff check . --output-format=github

      - name: Check formatting with ruff
        run: ruff format . --check

  test:
    runs-on: ubuntu-latest
    needs: lint   # tests only run if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest tomli

      - name: Cache HuggingFace embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-all-MiniLM-L6-v2
          restore-keys: hf-${{ runner.os }}-

      - name: Pre-download embedding model
        run: python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short
        env:
          CONFIG_PATH: configs/config.toml
          
      - name: Run integration tests (no LLM)
        run: pytest tests/integration/ -v --tb=short -m "not ollama"
        env:
          CONFIG_PATH: configs/config.toml
          HF_HUB_OFFLINE: "0"   # allow download in CI
