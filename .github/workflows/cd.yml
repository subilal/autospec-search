name: CD 

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_APP: ghcr.io/${{ github.repository_owner }}/autospec-app
  IMAGE_OLLAMA: ghcr.io/${{ github.repository_owner }}/autospec-ollama

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    outputs:
      app_tag: ${{ steps.meta_app.outputs.tags }}
      ollama_tag: ${{ steps.meta_ollama.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by GitHub, no setup needed

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for app image
        id: meta_app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_APP }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.app
          push: true
          tags: ${{ steps.meta_app.outputs.tags }}
          cache-from: type=gha         
          cache-to: type=gha,mode=max

      - name: Extract metadata for ollama image
        id: meta_ollama
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_OLLAMA }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push ollama image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ollama
          push: true
          tags: ${{ steps.meta_ollama.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build   # only runs if build job succeeds
    environment: production   # optional: add approval gate in GitHub settings

    steps:
      - name: Checkout code (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}        # your server IP or hostname
          username: ${{ secrets.DEPLOY_USER }}    # SSH user (e.g. ubuntu)
          key: ${{ secrets.DEPLOY_SSH_KEY }}      # private SSH key
          script: |
            cd /opt/autospec-search

            # Pull latest images from GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull

            # Restart containers with new images, zero downtime
            docker compose up -d --remove-orphans

            # Clean up old unused images to save disk space
            docker image prune -f

            echo " Deployment complete"
